server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # Scrape all Docker container logs
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      # Set container name as label
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: 'container'
      
      # Set compose service name
      - source_labels: ['__meta_docker_container_label_com_docker_compose_service']
        target_label: 'service'
      
      # Set compose project
      - source_labels: ['__meta_docker_container_label_com_docker_compose_project']
        target_label: 'project'
      
      # Extract log level from logs
      - source_labels: ['__meta_docker_container_log_stream']
        target_label: 'stream'
      
      # Add tier labels for microservices
      - source_labels: ['service']
        regex: '(api-gateway)'
        target_label: 'tier'
        replacement: 'gateway'
      
      - source_labels: ['service']
        regex: '(auth|user|product|cart|order|review|rating|payment|notification|admin|inventory|search)-service'
        target_label: 'tier'
        replacement: 'business-logic'
      
      - source_labels: ['service']
        regex: '(analytics|recommendation|email)-service'
        target_label: 'tier'
        replacement: 'python-services'
      
      - source_labels: ['service']
        regex: '(postgres|redis|rabbitmq|elasticsearch|mongodb)'
        target_label: 'tier'
        replacement: 'data'
      
      - source_labels: ['service']
        regex: '(prometheus|grafana|loki)'
        target_label: 'tier'
        replacement: 'monitoring'
      
      - source_labels: ['service']
        regex: '(frontend)'
        target_label: 'tier'
        replacement: 'presentation'
