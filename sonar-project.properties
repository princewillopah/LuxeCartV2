# SonarCloud project config. Update the keys below to match the project you
# create at https://sonarcloud.io (Organization → Analyze new project), then
# add a SONAR_TOKEN repository secret. The `sonarcloud` job in ci.yml reads this.
#
# Monorepo note: this is ONE Sonar project covering the whole repo. Sonar
# auto-detects JS/TS, Python, Java and Go sources. If you later want
# per-service projects, switch to Sonar's monorepo feature (one project key
# per service) and call the scan from _service-ci.yml instead.
sonar.organization=CHANGE_ME-org
sonar.projectKey=CHANGE_ME_luxecart
sonar.projectName=LuxeCart

# Sources / tests
sonar.sources=app
sonar.exclusions=**/node_modules/**,**/.next/**,**/dist/**,**/build/**,**/target/**,**/__pycache__/**,**/*.min.js,**/.venv/**,**/.nodejs-archive/**

# Language-specific (extend as coverage reports get wired up)
sonar.python.version=3.11
sonar.java.binaries=app/backend-services/product-service/target

# SCM
sonar.scm.provider=git
